<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Mistr Páčidlo: Velká firma</title>
    <style>
        body { margin: 0; background: #111; color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; display: flex; flex-direction: column; align-items: center; }
        canvas { background: #2c3e50; border: 4px solid #555; box-shadow: 0 0 50px rgba(0,0,0,0.8); cursor: none; }
        .ui { padding: 10px; font-size: 20px; display: flex; gap: 30px; font-weight: bold; background: #222; width: 100%; justify-content: center; border-bottom: 2px solid #444; }
        .record { color: #ffd700; }
        #timer.warning { color: #ff4757; animation: blink 0.5s infinite; }
        @keyframes blink { 50% { opacity: 0.5; } }
    </style>
</head>
<body>

<div class="ui">
    <div>Čas: <span id="timer">0.0</span>s</div>
    <div>Zbývá flákačů: <span id="count">0</span></div>
    <div class="record">Nejlepší rekord: <span id="best">--</span>s</div>
</div>
<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const timerEl = document.getElementById('timer');
const countEl = document.getElementById('count');
const bestEl = document.getElementById('best');

// Rozměry okna a světa
const VIEW_W = 1000;
const VIEW_H = 650;
const WORLD_W = 2000; // Velká mapa
const WORLD_H = 1500;
canvas.width = VIEW_W;
canvas.height = VIEW_H;

const phrases = ["Práce je nuda...", "Chci domů!", "Šéf je otrava.", "Zase pondělí?", "Dneska nic nedělám."];

let slackers = [];
let desks = [];
let player = { x: 1000, y: 750, size: 25, speed: 6 };
let camera = { x: 0, y: 0 };
let keys = {};
let timeLeft, timerInterval;
let gameActive = false;
let bestTime = localStorage.getItem('bestTimeUltra') || Infinity;

if(bestTime !== Infinity) bestEl.innerText = bestTime;

class Desk {
    constructor() {
        this.x = Math.random() * (WORLD_W - 100) + 50;
        this.y = Math.random() * (WORLD_H - 100) + 50;
        this.occupied = false;
    }
    draw(cx, cy) {
        ctx.font = "40px Arial";
        ctx.fillText("🖥️", this.x - cx, this.y - cy);
    }
}

class Slacker {
    constructor() {
        this.x = Math.random() * WORLD_W;
        this.y = Math.random() * WORLD_H;
        this.state = 'idle'; // 'idle', 'running', 'goingToWork', 'working'
        this.msg = phrases[Math.floor(Math.random() * phrases.length)];
        this.showMsg = Math.random() > 0.5;
        this.targetDesk = null;
        this.speed = 2 + Math.random() * 2;
    }

    update() {
        if (this.state === 'working') return;

        // Pokud je flákač vystrašen (v blízkosti hráče)
        let distToPlayer = Math.hypot(player.x - this.x, player.y - this.y);

        if (this.state === 'idle' || this.state === 'running') {
            if (distToPlayer < 150) {
                this.state = 'running';
                // Útěk od hráče
                let angle = Math.atan2(this.y - player.y, this.x - player.x);
                this.x += Math.cos(angle) * this.speed * 1.5;
                this.y += Math.sin(angle) * this.speed * 1.5;
            }

            if (distToPlayer < 50) { // ZASAŽEN PÁČIDLEM
                this.state = 'goingToWork';
                this.findDesk();
            }
        }

        if (this.state === 'goingToWork' && this.targetDesk) {
            let distToDesk = Math.hypot(this.targetDesk.x - this.x, this.targetDesk.y - this.y);
            if (distToDesk < 10) {
                this.state = 'working';
                checkWin();
            } else {
                let angle = Math.atan2(this.targetDesk.y - this.y, this.targetDesk.x - this.x);
                this.x += Math.cos(angle) * 4;
                this.y += Math.sin(angle) * 4;
            }
        }

        // Hranice světa
        this.x = Math.max(0, Math.min(WORLD_W, this.x));
        this.y = Math.max(0, Math.min(WORLD_H, this.y));
    }

    findDesk() {
        let freeDesks = desks.filter(d => !d.occupied);
        if (freeDesks.length > 0) {
            // Najde nejbližší volný stůl
            this.targetDesk = freeDesks.sort((a, b) => 
                Math.hypot(a.x - this.x, a.y - this.y) - Math.hypot(b.x - this.x, b.y - this.y)
            )[0];
            this.targetDesk.occupied = true;
        }
    }

    draw(cx, cy) {
        let screenX = this.x - cx;
        let screenY = this.y - cy;
        
        // Bublina
        if (this.state !== 'working' && this.showMsg) {
            ctx.fillStyle = "white";
            ctx.font = "12px sans-serif";
            ctx.fillText(this.msg, screenX - 20, screenY - 40);
        }

        ctx.font = "30px Arial";
        let icon = "😴";
        if (this.state === 'running') icon = "😨";
        if (this.state === 'goingToWork') icon = "🏃";
        if (this.state === 'working') icon = "👷";
        
        ctx.fillText(icon, screenX - 15, screenY + 10);
    }
}

function initLevel() {
    desks = [];
    slackers = [];
    let num = 15; // Počet lidí
    for (let i = 0; i < num + 5; i++) desks.push(new Desk()); // Víc stolů než lidí
    for (let i = 0; i < num; i++) slackers.push(new Slacker());

    player.x = WORLD_W / 2;
    player.y = WORLD_H / 2;
    timeLeft = 60;
    gameActive = true;
    countEl.innerText = num;

    if(timerInterval) clearInterval(timerInterval);
    timerInterval = setInterval(() => {
        timeLeft -= 0.1;
        if (timeLeft <= 0) gameOver();
        timerEl.innerText = Math.max(0, timeLeft).toFixed(1);
    }, 100);
}

function gameOver() {
    gameActive = false;
    clearInterval(timerInterval);
    alert("VYHAZOV! Nestihl jsi nahnat lidi ke stolům.");
    initLevel();
}

function checkWin() {
    let remaining = slackers.filter(s => s.state !== 'working').length;
    countEl.innerText = remaining;
    if (remaining === 0) {
        gameActive = false;
        clearInterval(timerInterval);
        let taken = parseFloat((60 - timeLeft).toFixed(1));
        if (taken < bestTime) {
            bestTime = taken;
            localStorage.setItem('bestTimeUltra', bestTime);
            bestEl.innerText = bestTime;
        }
        alert("SKVĚLÉ! Všichni makají. Tvůj čas: " + taken + "s");
        initLevel();
    }
}

function update() {
    if (!gameActive) return;

    if (keys['w'] || keys['ArrowUp']) player.y -= player.speed;
    if (keys['s'] || keys['ArrowDown']) player.y += player.speed;
    if (keys['a'] || keys['ArrowLeft']) player.x -= player.speed;
    if (keys['d'] || keys['ArrowRight']) player.x += player.speed;

    player.x = Math.max(0, Math.min(WORLD_W, player.x));
    player.y = Math.max(0, Math.min(WORLD_H, player.y));

    // Kamera následuje hráče
    camera.x = player.x - VIEW_W / 2;
    camera.y = player.y - VIEW_H / 2;
    // Omezení kamery na hranice světa
    camera.x = Math.max(0, Math.min(WORLD_W - VIEW_W, camera.x));
    camera.y = Math.max(0, Math.min(WORLD_H - VIEW_H, camera.y));

    slackers.forEach(s => s.update());
}

function draw() {
    ctx.clearRect(0, 0, VIEW_W, VIEW_H);

    // Mřížka podlahy
    ctx.strokeStyle = "#34495e";
    ctx.lineWidth = 1;
    for (let i = 0; i < WORLD_W; i += 100) {
        ctx.beginPath(); ctx.moveTo(i - camera.x, 0); ctx.lineTo(i - camera.x, VIEW_H); ctx.stroke();
    }
    for (let i = 0; i < WORLD_H; i += 100) {
        ctx.beginPath(); ctx.moveTo(0, i - camera.y); ctx.lineTo(VIEW_W, i - camera.y); ctx.stroke();
    }

    desks.forEach(d => d.draw(camera.x, camera.y));
    slackers.forEach(s => s.draw(camera.x, camera.y));

    // HRÁČ (Postavička s páčidlem)
    let px = player.x - camera.x;
    let py = player.y - camera.y;

    // Tělo
    ctx.font = "40px Arial";
    ctx.fillText("🤵", px - 20, py + 15);
    
    // Páčidlo
    ctx.strokeStyle = "#95a5a6";
    ctx.lineWidth = 6;
    ctx.lineCap = "round";
    ctx.beginPath();
    ctx.moveTo(px + 10, py);
    ctx.lineTo(px + 35, py - 20);
    ctx.lineTo(px + 40, py - 15);
    ctx.stroke();

    update();
    requestAnimationFrame(draw);
}

window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

initLevel();
draw();
</script>
</body>
</html>
