<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pajcrman: Konstrukce Hunter</title>
    <style>
        body { 
            margin: 0; padding: 10px; background: #111; color: white; 
            font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center;
            overflow-x: hidden; touch-action: manipulation;
        }
        .game-container { position: relative; width: 1000px; max-width: 100%; margin: 0 auto; box-sizing: border-box; touch-action: none; }
        .ui-bar { background: #222; padding: 10px 15px; font-size: 18px; display: flex; justify-content: space-between; align-items: center; font-weight: bold; border: 4px solid #555; border-bottom: none; border-radius: 10px 10px 0 0; box-sizing: border-box; }
        canvas { display: block; width: 100%; height: auto; background: #2c3e50; border: 4px solid #555; border-radius: 0 0 10px 10px; box-shadow: 0 10px 50px rgba(0,0,0,0.8); box-sizing: border-box; }
        
        /* Menu a Overlay */
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; z-index: 100; border-radius: 0 0 10px 10px; padding: 20px; box-sizing: border-box; }
        .hidden { display: none !important; }
        
        h1 { font-size: clamp(30px, 8vw, 55px); margin: 0 0 10px 0; color: #e74c3c; text-shadow: 2px 2px 0 #000; text-transform: uppercase; }
        p { font-size: 18px; margin-bottom: 20px; color: #ccc; }
        .btn { padding: 12px 25px; font-size: 18px; font-weight: bold; color: white; background: #2980b9; border: 3px solid #1f618d; border-radius: 8px; cursor: pointer; margin: 5px; text-transform: uppercase; transition: 0.2s; }
        .btn:hover { background: #3498db; transform: scale(1.05); }
        .btn-purple { background: #8e44ad; border-color: #732d91; }
        .btn-green { background: #27ae60; border-color: #1e8449; }
        
        /* Joystick */
        .joystick-area { position: absolute; bottom: 30px; left: 30px; width: 100px; height: 100px; background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.2); border-radius: 50%; z-index: 200; display: none; }
        .joystick-stick { position: absolute; top: 50%; left: 50%; width: 40px; height: 40px; background: #e74c3c; border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none; }
        .touch-mode .joystick-area { display: block; }

        /* Žebříček */
        .leaderboard-box { background: #000; border: 2px solid #f1c40f; border-radius: 10px; padding: 15px; width: 95%; max-width: 400px; margin: 15px 0; text-align: left; }
        .leaderboard-row { display: flex; justify-content: space-between; border-bottom: 1px solid #333; padding: 5px 0; font-family: monospace; }
        .input-name { padding: 10px; font-size: 18px; width: 80%; max-width: 250px; margin-bottom: 10px; background: #333; color: white; border: 1px solid #555; text-align: center; }
        
        .no-cursor { cursor: none; }
    </style>
</head>
<body>

<div class="game-container" id="game-wrapper">
    <div class="ui-bar">
        <div>Čas: <span id="timer">60.0</span>s</div>
        <div>Konstruktéři: <span id="count">0</span></div>
        <div style="color:#ffd700">Můj rekord: <span id="best">--</span>s</div>
    </div>

    <div style="position: relative;">
        <canvas id="gameCanvas" width="1000" height="650"></canvas>
        
        <div class="joystick-area" id="joystick-area"><div class="joystick-stick" id="joystick-stick"></div></div>

        <div id="screen-start" class="overlay">
            <h1>PAJCRMAN</h1>
            <p style="color:#f1c40f; font-weight:bold;">"Konstruktéři v Hunteru musí začít makat!"</p>
            <button class="btn" onclick="startCountdown()">Vlítnout na ně</button>
            <button class="btn btn-purple" onclick="showLeaderboard('screen-start')">🏆 Síň slávy</button>
        </div>

        <div id="screen-countdown" class="overlay hidden"><h1 id="countdown-text" style="font-size:120px;">5</h1></div>

        <div id="screen-win" class="overlay hidden">
            <h1>PAJCRMAN ROKU!</h1>
            <p>Všechny jsi nahnal k práci. Čas: <span id="win-time">0</span>s</p>
            
            <div id="save-section">
                <input type="text" id="player-name" class="input-name" placeholder="Tvé jméno" maxlength="12">
                <br>
                <button class="btn btn-green" onclick="saveToLocalLeaderboard()">Zapsat se na tomto PC</button>
                <button class="btn" style="background:#e67e22; border-color:#d35400;" onclick="copyResultToClipboard()">Zkopírovat a poslat do chatu</button>
            </div>
            
            <button class="btn" onclick="resetGame()">Další směna</button>
        </div>

        <div id="screen-lose" class="overlay hidden">
            <h1>KONEC HRY</h1>
            <p style="color:#e74c3c; font-weight:bold;">Firma zkrachovala, konstrukce se uflákala.</p>
            <button class="btn" onclick="resetGame()">Zkusit znovu</button>
            <button class="btn btn-purple" onclick="showLeaderboard('screen-lose')">🏆 Síň slávy</button>
        </div>

        <div id="screen-leaderboard" class="overlay hidden">
            <h2>Lokální žebříček (Hunter)</h2>
            <div id="leaderboard-content" class="leaderboard-box">Zatím žádné rekordy.</div>
            <button class="btn" onclick="closeLeaderboard()">Zpět</button>
        </div>
    </div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const VIEW_W = 1000, VIEW_H = 650, WORLD_W = 2400, WORLD_H = 1800;

let gameState = 'menu', timeLeft = 60, timerInterval;
let player = { x: 1200, y: 900, speed: 4.8, size: 20 };
let camera = { x: 0, y: 0 }, keys = {}, slackers = [], desks = [], walls = [];
let isMobile = /Android|iPhone|iPad/i.test(navigator.userAgent);
if(isMobile) document.getElementById('game-wrapper').classList.add('touch-mode');

// LOKÁLNÍ DATA
let localBest = localStorage.getItem('pajcrman_hunter_best') || "--";
document.getElementById('best').innerText = localBest;

function createWalls() {
    walls = [
        {x: 0, y: 0, w: WORLD_W, h: 50}, {x: 0, y: WORLD_H-50, w: WORLD_W, h: 50},
        {x: 0, y: 0, w: 50, h: WORLD_H}, {x: WORLD_W-50, y: 0, w: 50, h: WORLD_H},
        // Chodby a kanceláře
        {x: 800, y: 50, w: 40, h: 700}, {x: 800, y: 1000, w: 40, h: 750},
        {x: 1600, y: 50, w: 40, h: 700}, {x: 1600, y: 1000, w: 40, h: 750},
        {x: 50, y: 850, w: 750, h: 40}, {x: 1640, y: 850, w: 710, h: 40}
    ];
}

class Slacker {
    constructor() { this.spawn(); this.state = 'idle'; }
    spawn() { 
        this.x = 150 + Math.random() * (WORLD_W-300); 
        this.y = 150 + Math.random() * (WORLD_H-300);
        if(this.isWall(this.x, this.y)) this.spawn();
    }
    isWall(x, y) { return walls.some(w => x+25 > w.x && x-25 < w.x+w.w && y+25 > w.y && y-25 < w.y+w.h); }
    update() {
        if(this.state === 'working' || gameState !== 'playing') return;
        let d = Math.hypot(player.x - this.x, player.y - this.y);
        if(d < 50) { 
            this.state = 'going'; 
            this.target = desks.find(ds => !ds.occ) || desks[0]; 
            this.target.occ = true;
            checkWin();
        }
        if(this.state === 'going') {
            let a = Math.atan2(this.target.y - this.y, this.target.x - this.x);
            this.x += Math.cos(a) * 6; this.y += Math.sin(a) * 6; // Běží k PC (no-clip)
            if(Math.hypot(this.target.x-this.x, this.target.y-this.y) < 10) this.state = 'working';
        }
    }
    draw() {
        let sx = this.x - camera.x, sy = this.y - camera.y;
        if(sx < -50 || sx > VIEW_W+50 || sy < -50 || sy > VIEW_H+50) return;
        ctx.font = "32px Arial";
        let icon = this.state === 'working' ? "👷" : (this.state === 'going' ? "🏃" : "😴");
        ctx.fillText(icon, sx, sy);
    }
}

function generateWorld() {
    createWalls(); slackers = []; desks = [];
    // Rozmístění stolů do mřížek (open-space)
    for(let i=0; i<30; i++) {
        let dx = 100 + Math.random()*2200; let dy = 100 + Math.random()*1600;
        if(!walls.some(w => dx+40 > w.x && dx-40 < w.x+w.w && dy+40 > w.y && dy-40 < w.y+w.h)) desks.push({x: dx, y: dy, occ: false});
        else i--;
    }
    for(let i=0; i<15; i++) slackers.push(new Slacker());
}

function startCountdown() {
    document.getElementById('screen-start').classList.add('hidden');
    document.getElementById('screen-countdown').classList.remove('hidden');
    let c = 5; 
    let t = setInterval(() => {
        c--; document.getElementById('countdown-text').innerText = c || "START!";
        if(c < 0) { clearInterval(t); startGame(); }
    }, 1000);
}

function startGame() {
    document.getElementById('screen-countdown').classList.add('hidden');
    gameState = 'playing'; timeLeft = 60;
    if(!isMobile) canvas.classList.add('no-cursor');
    timerInterval = setInterval(() => {
        timeLeft -= 0.1; if(timeLeft <= 0) { timeLeft = 0; gameOver(); }
        document.getElementById('timer').innerText = timeLeft.toFixed(1);
    }, 100);
}

function gameOver() {
    gameState = 'lose'; clearInterval(timerInterval);
    canvas.classList.remove('no-cursor');
    document.getElementById('screen-lose').classList.remove('hidden');
}

function checkWin() {
    let rem = slackers.filter(s => s.state === 'idle').length;
    document.getElementById('count').innerText = rem;
    if(rem === 0) {
        gameState = 'win'; clearInterval(timerInterval);
        canvas.classList.remove('no-cursor');
        let final = (60 - timeLeft).toFixed(1);
        document.getElementById('win-time').innerText = final;
        document.getElementById('screen-win').classList.remove('hidden');
    }
}

// LOGIKA ŽEBŘÍČKU (LOKÁLNÍ)
function saveToLocalLeaderboard() {
    let name = document.getElementById('player-name').value.trim() || "Anonym";
    let final = (60 - timeLeft).toFixed(1);
    let scores = JSON.parse(localStorage.getItem('hunter_scores') || "[]");
    
    scores.push({name: name, time: parseFloat(final)});
    scores.sort((a,b) => a.time - b.time);
    scores = scores.slice(0, 10); // Jen top 10
    
    localStorage.setItem('hunter_scores', JSON.stringify(scores));
    
    if(localBest === "--" || final < localBest) {
        localStorage.setItem('pajcrman_hunter_best', final);
        document.getElementById('best').innerText = final;
    }
    alert("Zapsáno do místní síně slávy!");
    showLeaderboard('screen-win');
}

function showLeaderboard(from) {
    document.getElementById(from).classList.add('hidden');
    document.getElementById('screen-leaderboard').classList.remove('hidden');
    let div = document.getElementById('leaderboard-content');
    let scores = JSON.parse(localStorage.getItem('hunter_scores') || "[]");
    
    if(scores.length === 0) { div.innerHTML = "Zatím nikdo nemakal."; return; }
    
    let h = "";
    scores.forEach((s, i) => {
        h += `<div class="leaderboard-row"><span>${i+1}. ${s.name}</span><span>${s.time}s</span></div>`;
    });
    div.innerHTML = h;
}

function copyResultToClipboard() {
    let final = (60 - timeLeft).toFixed(1);
    let name = document.getElementById('player-name').value.trim() || "Pajcrman";
    let text = `🏆 PAJCRMAN ROKU: ${name} nahnal konstrukci k práci za ${final}s! Překonáš mě? Adresa: ${window.location.href}`;
    navigator.clipboard.writeText(text).then(() => {
        alert("Výsledek zkopírován! Teď ho vlož (Ctrl+V) do chatu v práci.");
    });
}

function closeLeaderboard() { resetGame(); }
function resetGame() { location.reload(); }

// Joystick
let joyX = 0, joyY = 0, joyActive = false, joyStartPos = {x:0, y:0};
const jArea = document.getElementById('joystick-area'), jStick = document.getElementById('joystick-stick');
jArea.addEventListener('touchstart', e => { joyActive = true; joyStartPos = {x: e.touches[0].clientX, y: e.touches[0].clientY}; });
window.addEventListener('touchmove', e => {
    if(!joyActive) return;
    let dx = e.touches[0].clientX - joyStartPos.x;
    let dy = e.touches[0].clientY - joyStartPos.y;
    let dist = Math.min(40, Math.hypot(dx, dy));
    let a = Math.atan2(dy, dx);
    joyX = Math.cos(a) * (dist/40); joyY = Math.sin(a) * (dist/40);
    jStick.style.transform = `translate(calc(-50% + ${Math.cos(a)*dist}px), calc(-50% + ${Math.sin(a)*dist}px))`;
}, {passive:false});
window.addEventListener('touchend', () => { joyActive = false; joyX = 0; joyY = 0; jStick.style.transform = 'translate(-50%, -50%)'; });

function update() {
    if(gameState === 'playing') {
        let dx = 0, dy = 0;
        if(keys['w'] || keys['arrowup']) dy = -player.speed;
        if(keys['s'] || keys['arrowdown']) dy = player.speed;
        if(keys['a'] || keys['arrowleft']) dx = -player.speed;
        if(keys['d'] || keys['arrowright']) dx = player.speed;
        if(joyActive) { dx = joyX * player.speed; dy = joyY * player.speed; }

        if(!walls.some(w => player.x+dx+18 > w.x && player.x+dx-18 < w.x+w.w && player.y+18 > w.y && player.y-18 < w.y+w.h)) player.x += dx;
        if(!walls.some(w => player.x+18 > w.x && player.x-18 < w.x+w.w && player.y+dy+18 > w.y && player.y+dy-18 < w.y+w.h)) player.y += dy;

        camera.x = Math.max(0, Math.min(WORLD_W - VIEW_W, player.x - VIEW_W/2));
        camera.y = Math.max(0, Math.min(WORLD_H - VIEW_H, player.y - VIEW_H/2));
        slackers.forEach(s => s.update());
    }
}

function draw() {
    ctx.clearRect(0, 0, VIEW_W, VIEW_H);
    ctx.textAlign = "center"; ctx.textBaseline = "middle";
    walls.forEach(w => { ctx.fillStyle = "#444"; ctx.fillRect(w.x - camera.x, w.y - camera.y, w.w, w.h); });
    desks.forEach(d => { ctx.font = "30px Arial"; ctx.fillText("🖥️", d.x - camera.x, d.y - camera.y); });
    slackers.forEach(s => s.draw());
    ctx.font = "45px Arial";
    ctx.fillText(gameState === 'lose' ? "💀" : "🤓", player.x - camera.x, player.y - camera.y);
    if(gameState === 'playing') {
        ctx.strokeStyle = "silver"; ctx.lineWidth = 5; ctx.beginPath();
        ctx.moveTo(player.x-camera.x+5, player.y-camera.y); ctx.lineTo(player.x-camera.x+25, player.y-camera.y-25); ctx.stroke();
    }
    update(); requestAnimationFrame(draw);
}

window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);
generateWorld(); draw();
</script>
</body>
</html>
