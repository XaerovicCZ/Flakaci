<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pajcrman: Hunter s.r.o.</title>
    <style>
        body { margin: 0; padding: 10px; background: #111; color: white; font-family: 'Segoe UI', Tahoma, sans-serif; display: flex; flex-direction: column; align-items: center; }
        .game-container { position: relative; width: 1000px; max-width: 100%; margin: 0 auto; box-sizing: border-box; touch-action: none; }
        .ui-bar { background: #222; padding: 10px 15px; font-size: 18px; display: flex; justify-content: space-between; align-items: center; font-weight: bold; border: 4px solid #555; border-bottom: none; border-radius: 10px 10px 0 0; box-sizing: border-box; flex-wrap: wrap; }
        .record { color: #ffd700; }
        #boost-indicator { color: #f39c12; min-width: 100px; text-align: center; }
        canvas { display: block; width: 100%; height: auto; background: #2c3e50; border: 4px solid #555; border-radius: 0 0 10px 10px; box-shadow: 0 10px 50px rgba(0,0,0,0.8); box-sizing: border-box; }
        .no-cursor { cursor: none; }
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.92); display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; z-index: 100; border-radius: 0 0 10px 10px; padding: 20px; box-sizing: border-box; }
        .hidden { display: none !important; }
        h1 { font-size: 45px; margin-bottom: 5px; color: #e74c3c; text-shadow: 2px 2px 0 #000; text-transform: uppercase; }
        h2 { font-size: 24px; margin-bottom: 10px; color: #f1c40f; }
        .intro-box { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 8px; margin-bottom: 20px; max-width: 85%; border-left: 4px solid #f1c40f; }
        .intro-text { font-size: 19px; color: #f1c40f; font-weight: bold; margin-bottom: 10px; font-style: italic; min-height: 50px; display: flex; align-items: center; justify-content: center; }
        .btn { padding: 12px 24px; font-size: 18px; font-weight: bold; color: white; background: #2980b9; border: 3px solid #1f618d; border-radius: 8px; cursor: pointer; transition: 0.2s; margin: 5px; text-transform: uppercase; }
        .btn:hover { background: #3498db; transform: scale(1.05); }
        .btn-danger { background: #c0392b; border-color: #922b21; }
        .btn-purple { background: #8e44ad; border-color: #732d91; }
        .btn-green { background: #27ae60; border-color: #1e8449; }
        .btn-orange { background: #e67e22; border-color: #d35400; }
        .btn-diff { padding: 8px 16px; font-size: 14px; background: #444; border: 2px solid #222; opacity: 0.5; }
        .btn-diff.active { background: #e74c3c; border-color: #c0392b; opacity: 1; }
        .btn-diff-normal.active { background: #2980b9; border-color: #1f618d; opacity: 1; }
        #countdown-text { font-size: 100px; font-weight: bold; color: #e74c3c; text-shadow: 0 0 30px rgba(231, 76, 60, 0.8); }
        .joystick-area { position: absolute; bottom: 20px; left: 20px; width: 120px; height: 120px; background: rgba(255, 255, 255, 0.15); border: 2px solid rgba(255,255,255,0.3); border-radius: 50%; z-index: 50; display: none; touch-action: none; }
        .joystick-stick { position: absolute; top: 50%; left: 50%; width: 50px; height: 50px; background: rgba(231, 76, 60, 0.8); border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none; }
        .touch-mode .joystick-area { display: block; }
        .leaderboard-box { background: rgba(0,0,0,0.9); border: 2px solid #f1c40f; border-radius: 10px; padding: 15px; width: 90%; max-width: 450px; margin: 15px 0; text-align: left; max-height: 250px; overflow-y: auto; }
        .leaderboard-row { display: flex; justify-content: space-between; border-bottom: 1px solid #333; padding: 8px 0; font-family: monospace; font-size: 16px; }
        .input-name { padding: 10px; font-size: 18px; width: 80%; max-width: 250px; margin-bottom: 10px; background: #333; color: white; border: 1px solid #555; text-align: center; border-radius: 5px; }
    </style>
</head>
<body id="main-body">

<div class="game-container" id="game-wrapper">
    <div class="ui-bar">
        <div>Čas: <span id="timer">60.0</span>s</div>
        <div>Konstruktéři: <span id="count">0</span></div>
        <div id="boost-indicator"></div>
        <div class="record">Můj TOP <span id="mode-label"></span>: <span id="best">--</span>s</div>
    </div>

    <div style="position: relative;">
        <canvas id="gameCanvas" width="1000" height="650"></canvas>
        <div class="joystick-area" id="joystick-area"><div class="joystick-stick" id="joystick-stick"></div></div>

        <div id="screen-start" class="overlay">
            <h1>PAJCRMAN</h1>
            <div id="dynamic-intro" class="intro-text"></div>
            
            <div class="intro-box">
                <p style="margin:5px 0 0 0; font-size:14px; color: #ccc;">
                    ☕ <b>Kafe na zemi:</b> Tvůj boost. | ☕ <b>Kafaři:</b> Utíkají o 25% rychleji!<br>
                    🧍 <b>Zamrzlíci:</b> 10% šance, že konstruktér jen zmateně stojí.
                </p>
            </div>

            <div style="margin-bottom: 15px;">
                <button id="btn-normal" class="btn btn-diff btn-diff-normal active" onclick="setDifficulty(false)">Normální (60s)</button>
                <button id="btn-hardcore" class="btn btn-diff" onclick="setDifficulty(true)">Hardcore 💀 (30s)</button>
            </div>
            
            <button class="btn" onclick="startCountdown()">Vlítnout na ně</button>
            <button class="btn btn-purple" onclick="showLeaderboard('screen-start')">🏆 Síň slávy</button>
            <br><button class="btn btn-danger" onclick="resetScores()" style="font-size: 11px; padding: 6px 12px; margin-top: 10px; opacity: 0.7;">🗑️ Vymazat historii</button>
        </div>

        <div id="screen-countdown" class="overlay hidden"><div id="countdown-text">5</div></div>

        <div id="screen-win" class="overlay hidden">
            <h1>PAJCRMAN ROKU!</h1>
            <h2>Na konstrukci je klid.</h2>
            <p id="win-p-extra"></p>
            <p>Tvůj čas: <span id="win-time">0</span>s <span id="win-mode" style="color:#e74c3c;"></span></p>
            
            <div style="margin: 10px 0;">
                <input type="text" id="player-name" class="input-name" placeholder="Tvé jméno" maxlength="15"><br>
                <button class="btn btn-green" onclick="saveToLocalLeaderboard()">Uložit skóre</button>
                <button class="btn btn-orange" onclick="copyResultToClipboard()">Kopírovat do chatu</button>
            </div>
            <div><button class="btn" onclick="resetGame()">Další obchůzka</button></div>
        </div>

        <div id="screen-lose" class="overlay hidden">
            <h1>DOHRA V HUNTERU</h1>
            <p id="lose-p-extra" style="font-style: italic; font-weight: bold; color: #e74c3c; font-size: 22px; max-width: 80%; line-height: 1.5;"></p>
            <div>
                <button class="btn" onclick="resetGame()">Zkusit znovu</button>
                <button class="btn btn-purple" onclick="showLeaderboard('screen-lose')">🏆 Síň slávy</button>
            </div>
        </div>

        <div id="screen-leaderboard" class="overlay hidden">
            <h2>Síň slávy Hunteru</h2>
            <div id="leaderboard-content" class="leaderboard-box"></div>
            <button class="btn" onclick="closeLeaderboard()">Zpět</button>
        </div>
    </div>
</div>

<button class="device-toggle" id="deviceToggleBtn" onclick="toggleTouchMode()">🎮 Přepnout na Dotykové ovládání</button>
