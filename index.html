<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Mistr Páčidlo: Korporátní pořádek</title>
    <style>
        body { margin: 0; background: #111; color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; display: flex; flex-direction: column; align-items: center; }
        canvas { background: #2c3e50; border: 4px solid #555; cursor: none; }
        .ui { padding: 10px; font-size: 20px; display: flex; gap: 30px; font-weight: bold; background: #222; width: 100%; justify-content: center; border-bottom: 2px solid #444; }
        .record { color: #ffd700; }
        #boost-indicator { color: #f39c12; min-width: 100px; text-align: center; }
    </style>
</head>
<body>

<div class="ui">
    <div>Čas: <span id="timer">0.0</span>s</div>
    <div>Zbývá nahnat: <span id="count">0</span></div>
    <div id="boost-indicator"></div>
    <div class="record">Rekord: <span id="best">--</span>s</div>
</div>
<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const timerEl = document.getElementById('timer');
const countEl = document.getElementById('count');
const bestEl = document.getElementById('best');
const boostEl = document.getElementById('boost-indicator');

const VIEW_W = 1000, VIEW_H = 650;
const WORLD_W = 2400, WORLD_H = 1800;
canvas.width = VIEW_W; canvas.height = VIEW_H;

let slackers = [], desks = [], walls = [], coffees = [];
let player = { x: 1200, y: 900, size: 20, speed: 6.5, baseSpeed: 6.5, isBoosted: false }; 
let camera = { x: 0, y: 0 };
let keys = {};
let timeLeft, timerInterval, gameActive = false;
let bestTime = localStorage.getItem('bestTimeCorporate') || Infinity;

if(bestTime !== Infinity) bestEl.innerText = bestTime;

function createWalls() {
    walls = [
        // Obvodové zdi
        {x: 0, y: 0, w: WORLD_W, h: 50}, 
        {x: 0, y: WORLD_H-50, w: WORLD_W, h: 50}, 
        {x: 0, y: 0, w: 50, h: WORLD_H}, 
        {x: WORLD_W-50, y: 0, w: 50, h: WORLD_H}, 
        
        // LEVÁ HORNÍ KANCELÁŘ
        {x: 50, y: 800, w: 400, h: 40}, 
        {x: 650, y: 800, w: 450, h: 40}, 
        {x: 1100, y: 50, w: 40, h: 300}, 
        {x: 1100, y: 550, w: 40, h: 250}, 

        // PRAVÁ HORNÍ KANCELÁŘ
        {x: 1300, y: 800, w: 450, h: 40}, 
        {x: 1950, y: 800, w: 400, h: 40}, 
        {x: 1300, y: 50, w: 40, h: 300}, 
        {x: 1300, y: 550, w: 40, h: 250}, 

        // LEVÁ DOLNÍ KANCELÁŘ
        {x: 50, y: 1000, w: 400, h: 40}, 
        {x: 650, y: 1000, w: 450, h: 40}, 
        {x: 1100, y: 1040, w: 40, h: 260}, 
        {x: 1100, y: 1500, w: 40, h: 250}, 

        // PRAVÁ DOLNÍ KANCELÁŘ
        {x: 1300, y: 1000, w: 450, h: 40}, 
        {x: 1950, y: 1000, w: 400, h: 40}, 
        {x: 1300, y: 1040, w: 40, h: 260}, 
        {x: 1300, y: 1500, w: 40, h: 250}
    ];
}

class Coffee {
    constructor() {
        this.spawn();
        this.collected = false;
    }
    spawn() {
        // Káva se nyní generuje výhradně v hlavních chodbách!
        if (Math.random() > 0.5) {
            // Svislá chodba
            this.x = 1150 + Math.random() * 100;
            this.y = 100 + Math.random() * (WORLD_H - 200);
        } else {
            // Vodorovná chodba
            this.x = 100 + Math.random() * (WORLD_W - 200);
            this.y = 850 + Math.random() * 100;
        }
    }
    draw(cx, cy) {
        if (this.collected) return;
        ctx.font = "30px Arial";
        ctx.fillText("☕", this.x - cx - 15, this.y - cy + 10);
    }
}

class Slacker {
    constructor() {
        this.spawn();
        this.state = 'idle';
        this.msg = ["Zzz...", "Schůzka?", "Ať už je pátek.", "Pauza!"][Math.floor(Math.random()*4)];
        this.targetDesk = null;
    }

    spawn() {
        this.x = Math.random() * (WORLD_W - 200) + 100;
        this.y = Math.random() * (WORLD_H - 200) + 100;
        if (checkWallCollision(this.x, this.y, 30)) this.spawn();
    }

    update() {
        if (this.state === 'working') return;

        let d = Math.hypot(player.x - this.x, player.y - this.y);

        if (this.state === 'idle' || this.state === 'running') {
            if (d < 220) {
                this.state = 'running';
                let angle = Math.atan2(this.y - player.y, this.x - player.x);
                this.move(Math.cos(angle) * 3.8, Math.sin(angle) * 3.8);
            } else {
                this.state = 'idle';
            }

            if (d < 45) { 
                this.state = 'goingToWork'; 
                let freeDesks = desks.filter(d => !d.occupied);
                if(freeDesks.length > 0) {
                    this.targetDesk = freeDesks.sort((a,b) => Math.hypot(a.x-this.x, a.y-this.y) - Math.hypot(b.x-this.x, b.y-this.y))[0];
                    this.targetDesk.occupied = true;
                }
                checkWin(); 
            }
        }

        if (this.state === 'goingToWork' && this.targetDesk) {
            let distToDesk = Math.hypot(this.targetDesk.x - this.x, this.targetDesk.y - this.y);
            if (distToDesk < 15) {
                this.state = 'working';
            } else {
                let angle = Math.atan2(this.targetDesk.y - this.y, this.targetDesk.x - this.x);
                this.move(Math.cos(angle) * 5, Math.sin(angle) * 5);
            }
        }
    }

    move(dx, dy) {
        if (!checkWallCollision(this.x + dx, this.y, 15)) this.x += dx;
        if (!checkWallCollision(this.x, this.y + dy, 15)) this.y += dy;
    }

    draw(cx, cy) {
        let sx = this.x - cx, sy = this.y - cy;
        ctx.font = "32px Arial";
        let icon = "😴"; 
        if (this.state === 'running') icon = "😨"; 
        if (this.state === 'goingToWork') icon = "🏃"; 
        if (this.state === 'working') icon = "👷"; 
        ctx.fillText(icon, sx - 16, sy + 12);
        if (this.state === 'idle') {
            ctx.fillStyle = "rgba(255,255,255,0.6)"; ctx.font = "11px Arial";
            ctx.fillText(this.msg, sx - 15, sy - 25);
        }
    }
}

function checkWallCollision(x, y, size) {
    return walls.some(w => x + size > w.x && x - size < w.x + w.w && y + size > w.y && y - size < w.y + w.h);
}

function initLevel() {
    createWalls();
    desks = []; slackers = []; coffees = [];
    
    // STRUKTUROVANÝ OPEN SPACE: Pevné středy 4 kanceláří
    const roomCenters = [
        {cx: 575, cy: 425},   // Levá horní
        {cx: 1825, cy: 425},  // Pravá horní
        {cx: 575, cy: 1375},  // Levá dolní
        {cx: 1825, cy: 1375}  // Pravá dolní
    ];

    // V každé místnosti vytvoříme 12 stolů (mřížka 4 sloupce, 3 řady)
    roomCenters.forEach(rc => {
        for(let r = -1; r <= 1; r++) { // 3 řady
            for(let c = -1.5; c <= 1.5; c += 1) { // 4 sloupce
                desks.push({
                    x: rc.cx + c * 200, 
                    y: rc.cy + r * 160, 
                    occupied: false
                });
            }
        }
    });

    for(let i=0; i<20; i++) slackers.push(new Slacker()); // 20 lidí na 48 míst
    for(let i=0; i<5; i++) coffees.push(new Coffee());

    player.x = 1200; player.y = 900; // Začínáš v centru firmy
    timeLeft = 110; gameActive = true;
    countEl.innerText = slackers.length;
    if(timerInterval) clearInterval(timerInterval);
    timerInterval = setInterval(() => { timeLeft -= 0.1; if(timeLeft<=0) gameOver(); timerEl.innerText = Math.max(0, timeLeft).toFixed(1); }, 100);
}

function gameOver() { gameActive = false; alert("VYHAZOV! Limit vypršel."); initLevel(); }

function checkWin() {
    let rem = slackers.filter(s => s.state === 'idle' || s.state === 'running').length;
    countEl.innerText = rem;
    if(rem === 0) {
        gameActive = false; clearInterval(timerInterval);
        let time = parseFloat((110 - timeLeft).toFixed(1));
        if(time < bestTime) { bestTime = time; localStorage.setItem('bestTimeCorporate', bestTime); bestEl.innerText = bestTime; }
        alert("Manažer měsíce! Všichni makají. Čas: " + time + "s");
        initLevel();
    }
}

function update() {
    if(!gameActive) return;
    let dx = 0, dy = 0;
    if (keys['w']) dy -= player.speed; if (keys['s']) dy += player.speed;
    if (keys['a']) dx -= player.speed; if (keys['d']) dx += player.speed;

    if (!checkWallCollision(player.x + dx, player.y, player.size)) player.x += dx;
    if (!checkWallCollision(player.x, player.y + dy, player.size)) player.y += dy;

    camera.x = Math.max(0, Math.min(WORLD_W - VIEW_W, player.x - VIEW_W/2));
    camera.y = Math.max(0, Math.min(WORLD_H - VIEW_H, player.y - VIEW_H/2));

    coffees.forEach(c => {
        if(!c.collected && Math.hypot(player.x - c.x, player.y - c.y) < 35) {
            c.collected = true; player.isBoosted = true; player.speed = player.baseSpeed * 1.7;
            boostEl.innerText = "⚡ KOFEIN!";
            setTimeout(() => { player.isBoosted = false; player.speed = player.baseSpeed; boostEl.innerText = ""; }, 8000);
        }
    });
    slackers.forEach(s => s.update());
}

function draw() {
    ctx.clearRect(0, 0, VIEW_W, VIEW_H);
    
    // Zdi
    ctx.fillStyle = "#34495e";
    walls.forEach(w => ctx.fillRect(w.x - camera.x, w.y - camera.y, w.w, w.h));
    
    // Pracovní stoly (nyní s vizuálem samotného stolu)
    desks.forEach(d => {
        // Vykreslení šedé desky stolu
        ctx.fillStyle = "#555"; 
        ctx.fillRect(d.x - camera.x - 30, d.y - camera.y - 20, 60, 40);
        
        // Vykreslení počítače
        ctx.fillStyle = "white";
        ctx.font = "30px Arial";
        ctx.fillText("🖥️", d.x - camera.x - 15, d.y - camera.y + 10);
    });
    
    coffees.forEach(c => c.draw(camera.x, camera.y));
    slackers.forEach(s => s.draw(camera.x, camera.y));

    // Hráč
    let px = player.x - camera.x, py = player.y - camera.y;
    if(player.isBoosted) { ctx.shadowBlur = 20; ctx.shadowColor = "#f39c12"; }
    ctx.font = "42px Arial";
    ctx.fillText("🤵", px - 22, py + 16);
    ctx.shadowBlur = 0;
    
    // Páčidlo
    ctx.strokeStyle = "#95a5a6"; ctx.lineWidth = 6; ctx.lineCap = "round";
    ctx.beginPath();
    ctx.moveTo(px + 12, py); ctx.lineTo(px + 40, py - 24); ctx.lineTo(px + 46, py - 18);
    ctx.stroke();

    update();
    requestAnimationFrame(draw);
}

window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);
initLevel();
draw();
</script>
</body>
</html>
