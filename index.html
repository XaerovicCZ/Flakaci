<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Mistr Páčidlo: Efektivita ihned!</title>
    <style>
        body { margin: 0; background: #111; color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; display: flex; flex-direction: column; align-items: center; }
        canvas { background: #2c3e50; border: 4px solid #555; cursor: none; }
        .ui { padding: 10px; font-size: 20px; display: flex; gap: 30px; font-weight: bold; background: #222; width: 100%; justify-content: center; border-bottom: 2px solid #444; }
        .record { color: #ffd700; }
        #boost-indicator { color: #f39c12; min-width: 100px; text-align: center; }
    </style>
</head>
<body>

<div class="ui">
    <div>Čas: <span id="timer">0.0</span>s</div>
    <div>Zbývá nahnat: <span id="count">0</span></div>
    <div id="boost-indicator"></div>
    <div class="record">Rekord: <span id="best">--</span>s</div>
</div>
<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const timerEl = document.getElementById('timer');
const countEl = document.getElementById('count');
const bestEl = document.getElementById('best');
const boostEl = document.getElementById('boost-indicator');

const VIEW_W = 1000, VIEW_H = 650;
const WORLD_W = 2200, WORLD_H = 1600;
canvas.width = VIEW_W; canvas.height = VIEW_H;

let slackers = [], desks = [], walls = [], coffees = [];
let player = { x: 200, y: 200, size: 20, speed: 6.5, baseSpeed: 6.5, isBoosted: false };
let camera = { x: 0, y: 0 };
let keys = {};
let timeLeft, timerInterval, gameActive = false;
let bestTime = localStorage.getItem('bestTimeOfficeV3') || Infinity;

if(bestTime !== Infinity) bestEl.innerText = bestTime;

function createWalls() {
    walls = [
        {x: 0, y: 0, w: WORLD_W, h: 40}, 
        {x: 0, y: WORLD_H-40, w: WORLD_W, h: 40}, 
        {x: 0, y: 0, w: 40, h: WORLD_H}, 
        {x: WORLD_W-40, y: 0, w: 40, h: WORLD_H}, 
        // Rozdělení místností
        {x: 600, y: 0, w: 40, h: 650},
        {x: 600, y: 950, w: 40, h: 650},
        {x: 600, y: 950, w: 800, h: 40},
        {x: 1400, y: 0, w: 40, h: 1200},
        {x: 1400, y: 1400, w: 40, h: 200},
        {x: 600, y: 500, w: 500, h: 40}
    ];
}

class Coffee {
    constructor() {
        this.x = Math.random() * (WORLD_W - 200) + 100;
        this.y = Math.random() * (WORLD_H - 200) + 100;
        this.collected = false;
    }
    draw(cx, cy) {
        if (this.collected) return;
        ctx.font = "30px Arial";
        ctx.fillText("☕", this.x - cx - 15, this.y - cy + 10);
    }
}

class Slacker {
    constructor() {
        this.spawn();
        this.state = 'idle'; // idle, running, goingToWork, working
        this.msg = ["Zzz...", "Práce? Neznám.", "Chrrr..", "Dneska ne.."][Math.floor(Math.random()*4)];
        this.targetDesk = null;
    }

    spawn() {
        this.x = Math.random() * (WORLD_W - 160) + 80;
        this.y = Math.random() * (WORLD_H - 160) + 80;
        if (checkWallCollision(this.x, this.y, 25)) this.spawn();
    }

    update() {
        if (this.state === 'working') return;

        let d = Math.hypot(player.x - this.x, player.y - this.y);

        // STAV: Spí nebo Utíká (😨)
        if (this.state === 'idle' || this.state === 'running') {
            if (d < 180) {
                this.state = 'running';
                let angle = Math.atan2(this.y - player.y, this.x - player.x);
                this.move(Math.cos(angle) * 3.8, Math.sin(angle) * 3.8);
            } else {
                this.state = 'idle';
            }

            // ZÁSAH PÁČIDLEM -> Okamžitě počítáme jako chyceného
            if (d < 45) { 
                this.state = 'goingToWork'; 
                let freeDesks = desks.filter(d => !d.occupied);
                if(freeDesks.length > 0) {
                    this.targetDesk = freeDesks.sort((a,b) => Math.hypot(a.x-this.x, a.y-this.y) - Math.hypot(b.x-this.x, b.y-this.y))[0];
                    this.targetDesk.occupied = true;
                }
                checkWin(); // Zavoláme hned při chycení!
            }
        }

        // STAV: Běží k počítači (🏃)
        if (this.state === 'goingToWork' && this.targetDesk) {
            let distToDesk = Math.hypot(this.targetDesk.x - this.x, this.targetDesk.y - this.y);
            if (distToDesk < 15) {
                this.state = 'working';
            } else {
                let angle = Math.atan2(this.targetDesk.y - this.y, this.targetDesk.x - this.x);
                this.move(Math.cos(angle) * 5, Math.sin(angle) * 5);
            }
        }
    }

    move(dx, dy) {
        // Klouzání podél zdí (pokud narazí v jednom směru, zkusí aspoň druhý)
        if (!checkWallCollision(this.x + dx, this.y, 15)) {
            this.x += dx;
        } else {
            // Pokud nemůže vodorovně, zkusí aspoň trochu popojet svisle
            if (!checkWallCollision(this.x, this.y + dy, 15)) this.y += dy*0.5;
        }
        
        if (!checkWallCollision(this.x, this.y + dy, 15)) {
            this.y += dy;
        } else {
            // Pokud nemůže svisle, zkusí aspoň trochu popojet vodorovně
            if (!checkWallCollision(this.x + dx, this.y, 15)) this.x += dx*0.5;
        }
    }

    draw(cx, cy) {
        let sx = this.x - cx, sy = this.y - cy;
        ctx.font = "32px Arial";
        
        let icon = "😴"; 
        if (this.state === 'running') icon = "😨"; 
        if (this.state === 'goingToWork') icon = "🏃"; 
        if (this.state === 'working') icon = "👷"; 

        ctx.fillText(icon, sx - 16, sy + 12);
        
        if (this.state === 'idle') {
            ctx.fillStyle = "rgba(255,255,255,0.6)"; ctx.font = "11px Arial";
            ctx.fillText(this.msg, sx - 15, sy - 25);
        }
    }
}

function checkWallCollision(x, y, size) {
    return walls.some(w => x + size > w.x && x - size < w.x + w.w && y + size > w.y && y - size < w.y + w.h);
}

function initLevel() {
    createWalls();
    desks = []; slackers = []; coffees = [];
    for(let i=0; i<25; i++) { // Víc stolů
        let dx = Math.random()*(WORLD_W-150)+75, dy = Math.random()*(WORLD_H-150)+75;
        if(!checkWallCollision(dx,dy,40)) desks.push({x:dx, y:dy, occupied:false}); else i--;
    }
    for(let i=0; i<15; i++) slackers.push(new Slacker());
    for(let i=0; i<3; i++) coffees.push(new Coffee());

    player.x = 100; player.y = 100;
    timeLeft = 90; gameActive = true;
    countEl.innerText = slackers.length;
    if(timerInterval) clearInterval(timerInterval);
    timerInterval = setInterval(() => { timeLeft -= 0.1; if(timeLeft<=0) gameOver(); timerEl.innerText = Math.max(0, timeLeft).toFixed(1); }, 100);
}

function gameOver() { gameActive = false; alert("VYHAZOV! Příliš pomalé nahánění."); initLevel(); }

function checkWin() {
    // Teď počítáme jen ty, co jsou ještě spící nebo utíkající (tzn. ne ty, co už běží k práci)
    let rem = slackers.filter(s => s.state === 'idle' || s.state === 'running').length;
    countEl.innerText = rem;
    
    if(rem === 0) {
        gameActive = false; clearInterval(timerInterval);
        let time = parseFloat((90 - timeLeft).toFixed(1));
        if(time < bestTime) { bestTime = time; localStorage.setItem('bestTimeOfficeV3', bestTime); bestEl.innerText = bestTime; }
        alert("Hotovo! Všichni jsou na cestě k práci. Čas: " + time + "s");
        initLevel();
    }
}

function update() {
    if(!gameActive) return;
    let dx = 0, dy = 0;
    if (keys['w']) dy -= player.speed; if (keys['s']) dy += player.speed;
    if (keys['a']) dx -= player.speed; if (keys['d']) dx += player.speed;

    if (!checkWallCollision(player.x + dx, player.y, player.size)) player.x += dx;
    if (!checkWallCollision(player.x, player.y + dy, player.size)) player.y += dy;

    camera.x = Math.max(0, Math.min(WORLD_W - VIEW_W, player.x - VIEW_W/2));
    camera.y = Math.max(0, Math.min(WORLD_H - VIEW_H, player.y - VIEW_H/2));

    coffees.forEach(c => {
        if(!c.collected && Math.hypot(player.x - c.x, player.y - c.y) < 35) {
            c.collected = true; player.isBoosted = true; player.speed = player.baseSpeed * 1.7;
            boostEl.innerText = "⚡ KOFEIN!";
            setTimeout(() => { player.isBoosted = false; player.speed = player.baseSpeed; boostEl.innerText = ""; }, 8000);
        }
    });
    slackers.forEach(s => s.update());
}

function draw() {
    ctx.clearRect(0, 0, VIEW_W, VIEW_H);
    ctx.fillStyle = "#34495e";
    walls.forEach(w => ctx.fillRect(w.x - camera.x, w.y - camera.y, w.w, w.h));
    
    ctx.font = "35px Arial";
    desks.forEach(d => ctx.fillText("🖥️", d.x - camera.x - 18, d.y - camera.y + 15));
    
    coffees.forEach(c => c.draw(camera.x, camera.y));
    slackers.forEach(s => s.draw(camera.x, camera.y));

    // Hráč
    let px = player.x - camera.x, py = player.y - camera.y;
    if(player.isBoosted) { ctx.shadowBlur = 20; ctx.shadowColor = "#f39c12"; }
    ctx.font = "40px Arial";
    ctx.fillText("🤵", px - 20, py + 15);
    ctx.shadowBlur = 0;
    
    // Páčidlo
    ctx.strokeStyle = "#95a5a6"; ctx.lineWidth = 5; ctx.lineCap = "round";
    ctx.beginPath();
    ctx.moveTo(px + 10, py); ctx.lineTo(px + 38, py - 22); ctx.lineTo(px + 44, py - 16);
    ctx.stroke();

    update();
    requestAnimationFrame(draw);
}

window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);
initLevel();
draw();
</script>
</body>
</html>
