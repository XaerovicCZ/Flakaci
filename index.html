<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Mistr Páčidlo: Office Horor</title>
    <style>
        body { margin: 0; background: #111; color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; display: flex; flex-direction: column; align-items: center; }
        canvas { background: #2c3e50; border: 4px solid #555; cursor: none; }
        .ui { padding: 10px; font-size: 20px; display: flex; gap: 30px; font-weight: bold; background: #222; width: 100%; justify-content: center; border-bottom: 2px solid #444; }
        .record { color: #ffd700; }
        #boost-indicator { color: #f39c12; min-width: 100px; text-align: center; }
    </style>
</head>
<body>

<div class="ui">
    <div>Čas: <span id="timer">0.0</span>s</div>
    <div>Flákači: <span id="count">0</span></div>
    <div id="boost-indicator"></div>
    <div class="record">Rekord: <span id="best">--</span>s</div>
</div>
<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const timerEl = document.getElementById('timer');
const countEl = document.getElementById('count');
const bestEl = document.getElementById('best');
const boostEl = document.getElementById('boost-indicator');

const VIEW_W = 1000, VIEW_H = 650;
const WORLD_W = 2200, WORLD_H = 1600;
canvas.width = VIEW_W; canvas.height = VIEW_H;

let slackers = [], desks = [], walls = [], coffees = [];
let player = { x: 200, y: 200, size: 20, speed: 5.5, baseSpeed: 5.5, isBoosted: false };
let camera = { x: 0, y: 0 };
let keys = {};
let timeLeft, timerInterval, gameActive = false;
let bestTime = localStorage.getItem('bestTimeMaze') || Infinity;

if(bestTime !== Infinity) bestEl.innerText = bestTime;

// Definice zdí (x, y, šířka, výška)
function createWalls() {
    walls = [
        {x: 0, y: 0, w: WORLD_W, h: 40}, // Horní okraj
        {x: 0, y: WORLD_H-40, w: WORLD_W, h: 40}, // Dolní
        {x: 0, y: 0, w: 40, h: WORLD_H}, // Levý
        {x: WORLD_W-40, y: 0, w: 40, h: WORLD_H}, // Pravý
        // Vnitřní kanceláře
        {x: 400, y: 0, w: 40, h: 500},
        {x: 400, y: 700, w: 40, h: 900},
        {x: 400, y: 700, w: 600, h: 40},
        {x: 1200, y: 0, w: 40, h: 1000},
        {x: 1200, y: 1200, w: 40, h: 400},
        {x: 1200, y: 1000, w: 600, h: 40},
        {x: 1800, y: 400, w: 400, h: 40}
    ];
}

class Coffee {
    constructor() {
        this.x = Math.random() * (WORLD_W - 200) + 100;
        this.y = Math.random() * (WORLD_H - 200) + 100;
        this.collected = false;
    }
    draw(cx, cy) {
        if (this.collected) return;
        ctx.font = "30px Arial";
        ctx.fillText("☕", this.x - cx - 15, this.y - cy + 10);
    }
}

class Slacker {
    constructor() {
        this.spawn();
        this.state = 'idle'; // idle, running, goingToWork, working
        this.msg = ["Práce šlechtí, ale mě ne.", "Už aby bylo pivo.", "Nudaaa", "Šéf jde!"][Math.floor(Math.random()*4)];
        this.msgTimer = Math.random() * 200;
    }

    spawn() {
        this.x = Math.random() * (WORLD_W - 100) + 50;
        this.y = Math.random() * (WORLD_H - 100) + 50;
        if (checkWallCollision(this.x, this.y, 20)) this.spawn();
    }

    update() {
        if (this.state === 'working') return;
        let d = Math.hypot(player.x - this.x, player.y - this.y);

        if (this.state === 'idle' || this.state === 'running') {
            if (d < 180) {
                this.state = 'running';
                let angle = Math.atan2(this.y - player.y, this.x - player.x);
                this.move(Math.cos(angle) * 3, Math.sin(angle) * 3);
            }
            if (d < 50) { 
                this.state = 'goingToWork'; 
                this.targetDesk = desks.find(d => !d.occupied);
                if(this.targetDesk) this.targetDesk.occupied = true;
            }
        }

        if (this.state === 'goingToWork' && this.targetDesk) {
            let angle = Math.atan2(this.targetDesk.y - this.y, this.targetDesk.x - this.x);
            this.move(Math.cos(angle) * 4, Math.sin(angle) * 4);
            if (Math.hypot(this.targetDesk.x - this.x, this.targetDesk.y - this.y) < 15) {
                this.state = 'working';
                checkWin();
            }
        }
    }

    move(dx, dy) {
        if (!checkWallCollision(this.x + dx, this.y, 15)) this.x += dx;
        if (!checkWallCollision(this.x, this.y + dy, 15)) this.y += dy;
    }

    draw(cx, cy) {
        let sx = this.x - cx, sy = this.y - cy;
        ctx.font = "30px Arial";
        let icon = (this.state === 'working') ? "👷" : (this.state === 'running' ? "😨" : "😴");
        ctx.fillText(icon, sx - 15, sy + 10);
        if (this.state === 'idle' && this.msgTimer-- > 0) {
            ctx.fillStyle = "white"; ctx.font = "12px Arial";
            ctx.fillText(this.msg, sx - 20, sy - 30);
        }
    }
}

function checkWallCollision(x, y, size) {
    return walls.some(w => x + size > w.x && x - size < w.x + w.w && y + size > w.y && y - size < w.y + w.h);
}

function initLevel() {
    createWalls();
    desks = []; slackers = []; coffees = [];
    for(let i=0; i<15; i++) {
        let dx = Math.random()*(WORLD_W-100)+50, dy = Math.random()*(WORLD_H-100)+50;
        if(!checkWallCollision(dx,dy,30)) desks.push({x:dx, y:dy, occupied:false}); else i--;
    }
    for(let i=0; i<12; i++) slackers.push(new Slacker());
    for(let i=0; i<3; i++) coffees.push(new Coffee());

    player.x = 100; player.y = 100;
    timeLeft = 70; gameActive = true;
    countEl.innerText = slackers.length;
    if(timerInterval) clearInterval(timerInterval);
    timerInterval = setInterval(() => { timeLeft -= 0.1; if(timeLeft<=0) gameOver(); timerEl.innerText = Math.max(0, timeLeft).toFixed(1); }, 100);
}

function gameOver() { gameActive = false; alert("VYHAZOV!"); initLevel(); }

function checkWin() {
    let rem = slackers.filter(s => s.state !== 'working').length;
    countEl.innerText = rem;
    if(rem === 0) {
        gameActive = false; clearInterval(timerInterval);
        let time = parseFloat((70 - timeLeft).toFixed(1));
        if(time < bestTime) { bestTime = time; localStorage.setItem('bestTimeMaze', bestTime); bestEl.innerText = bestTime; }
        alert("Všichni makají! Čas: " + time + "s");
        initLevel();
    }
}

function update() {
    if(!gameActive) return;
    let dx = 0, dy = 0;
    if (keys['w']) dy -= player.speed; if (keys['s']) dy += player.speed;
    if (keys['a']) dx -= player.speed; if (keys['d']) dx += player.speed;

    if (!checkWallCollision(player.x + dx, player.y, player.size)) player.x += dx;
    if (!checkWallCollision(player.x, player.y + dy, player.size)) player.y += dy;

    camera.x = Math.max(0, Math.min(WORLD_W - VIEW_W, player.x - VIEW_W/2));
    camera.y = Math.max(0, Math.min(WORLD_H - VIEW_H, player.y - VIEW_H/2));

    coffees.forEach(c => {
        if(!c.collected && Math.hypot(player.x - c.x, player.y - c.y) < 30) {
            c.collected = true; player.isBoosted = true; player.speed = player.baseSpeed * 1.7;
            boostEl.innerText = "⚡ KOFEIN!";
            setTimeout(() => { player.isBoosted = false; player.speed = player.baseSpeed; boostEl.innerText = ""; }, 6000);
        }
    });
    slackers.forEach(s => s.update());
}

function draw() {
    ctx.clearRect(0, 0, VIEW_W, VIEW_H);
    ctx.fillStyle = "#34495e";
    walls.forEach(w => ctx.fillRect(w.x - camera.x, w.y - camera.y, w.w, w.h));
    ctx.font = "40px Arial";
    desks.forEach(d => ctx.fillText("🖥️", d.x - camera.x - 20, d.y - camera.y + 15));
    coffees.forEach(c => c.draw(camera.x, camera.y));
    slackers.forEach(s => s.draw(camera.x, camera.y));

    // Hráč s páčidlem
    let px = player.x - camera.x, py = player.y - camera.y;
    if(player.isBoosted) { ctx.shadowBlur = 15; ctx.shadowColor = "orange"; }
    ctx.fillText("🤵", px - 20, py + 15);
    ctx.shadowBlur = 0;
    ctx.strokeStyle = "#95a5a6"; ctx.lineWidth = 5; ctx.beginPath();
    ctx.moveTo(px + 10, py); ctx.lineTo(px + 35, py - 20); ctx.lineTo(px + 40, py - 15); ctx.stroke();

    update();
    requestAnimationFrame(draw);
}

window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);
initLevel();
draw();
</script>
</body>
</html>
